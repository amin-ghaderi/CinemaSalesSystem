name: Release Pipeline


on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: src/CinemaSalesSystem.Presentation/CinemaSalesSystem.Presentation.csproj
  SOLUTION_PATH: CinemaSalesSystem.sln
  VERSION: '1.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build Solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal

      - name: Publish Application
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained false \
            --output publish

      - name: Upload Application Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinemaSalesSystem-App
          path: publish

      - name: Build Docker Image
        run: docker build -t cinemasalessystem:${{ env.VERSION }} .

      - name: Save Docker Image
        run: |
          mkdir -p docker-image
          docker save cinemasalessystem:${{ env.VERSION }} \
            -o docker-image/cinemasalessystem_${{ env.VERSION }}.tar

      - name: Upload Docker Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinemaSalesSystem-Docker
          path: docker-image

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CinemaSalesSystem v${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          body_path: docs/release/Release_Notes_v1.0.0.md
          files: |
            docker-image/cinemasalessystem_${{ env.VERSION }}.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
